<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyRobin Mitra Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // KONFIGURASI API
        const API_URL = "https://script.google.com/macros/s/AKfycby8rQDb6sYjE15FTBbGJO4kU_ROTizDfYcXzSg9-NhASxxcNHWKqOa8r5wD67a_ZxNP/exec";

        const App = () => {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState("");
            const [savingId, setSavingId] = useState(null);
            const [notification, setNotification] = useState(null);

            useEffect(() => {
                fetchData();
            }, []);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const response = await fetch(API_URL);
                    const result = await response.json();
                    setData(result);
                } catch (error) {
                    showNotification("Gagal memuat data spreadsheet", "error");
                } finally {
                    setLoading(false);
                }
            };

            const showNotification = (msg, type = "success") => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 4000);
            };

            const handleInputChange = (rowIndex, field, value) => {
                setData(prev => prev.map(item => 
                    item.rowIndex === rowIndex ? { ...item, [field]: value } : item
                ));
            };

            const handleSave = async (row) => {
                setSavingId(row.rowIndex);
                try {
                    await fetch(API_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        cache: 'no-cache',
                        body: JSON.stringify({
                            rowIndex: row.rowIndex,
                            Join: row.Join,
                            Verif: row.Verif,
                            Remark: row.Remark
                        })
                    });
                    showNotification(`Data ${row.MitraName} berhasil diperbarui!`);
                } catch (error) {
                    showNotification("Error saat menyimpan", "error");
                } finally {
                    setSavingId(null);
                }
            };

            const handleWhatsApp = (phone) => {
                if (!phone) return showNotification("No. HP tidak ada", "error");
                let cleanPhone = phone.toString().replace(/[^0-9]/g, '');
                if (cleanPhone.startsWith('0')) cleanPhone = '62' + cleanPhone.slice(1);
                
                const msg = "Hallo Mitra MyRobin silahn untuk join Grub WhatsApp berikut https://chat.whatsapp.com/BaoeluDFBFpHdcE7dSBpBE?mode=gi_t";
                window.open(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`, '_blank');
            };

            const filteredData = data.filter(item => 
                Object.values(item).some(val => 
                    val?.toString().toLowerCase().includes(searchTerm.toLowerCase())
                )
            );

            return (
                <div className="min-h-screen pb-20">
                    {/* Header Nav */}
                    <header className="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-blue-600 rounded-lg"></div>
                                <h1 className="font-bold text-xl tracking-tight text-slate-800">MyRobin <span className="text-blue-600">Mitra</span></h1>
                            </div>
                            <div className="relative w-1/3 hidden md:block">
                                <i data-lucide="search" className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                                <input 
                                    type="text" 
                                    placeholder="Cari mitra..." 
                                    className="w-full pl-10 pr-4 py-2 bg-slate-100 border-none rounded-full text-sm focus:ring-2 focus:ring-blue-500/20 transition-all"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-4 pt-8">
                        <div className="mb-8 md:hidden">
                             <input 
                                type="text" 
                                placeholder="Cari Nama/ID/Kota..." 
                                className="w-full px-5 py-3 bg-white border border-slate-200 rounded-2xl shadow-sm outline-none"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>

                        {loading ? (
                            <div className="flex flex-col items-center justify-center py-40 gap-4">
                                <div className="w-12 h-12 border-4 border-blue-600/20 border-t-blue-600 rounded-full animate-spin"></div>
                                <p className="text-slate-500 font-medium">Sinkronisasi Spreadsheet...</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {filteredData.map(mitra => (
                                    <div key={mitra.rowIndex} className="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden flex flex-col group hover:shadow-xl transition-all duration-300">
                                        <div className="p-6 pb-4">
                                            <div className="flex justify-between items-start mb-4">
                                                <div className="p-3 bg-blue-50 rounded-2xl text-blue-600">
                                                    <i data-lucide="user" className="w-6 h-6"></i>
                                                </div>
                                                <span className="text-[10px] font-bold bg-slate-100 text-slate-500 px-3 py-1 rounded-full uppercase tracking-widest italic">{mitra.Type}</span>
                                            </div>
                                            <h3 className="text-lg font-extrabold text-slate-800 mb-1 leading-tight">{mitra.MitraName}</h3>
                                            <p className="text-xs font-mono text-slate-400 mb-4 tracking-tighter uppercase">ID: {mitra.MitraID}</p>
                                            
                                            <div className="space-y-2.5 mb-6">
                                                <div className="flex items-center gap-3 text-sm text-slate-600">
                                                    <i data-lucide="briefcase" className="w-4 h-4 text-blue-400"></i>
                                                    <span className="font-medium">{mitra.Role} • {mitra.Office}</span>
                                                </div>
                                                <div className="flex items-center gap-3 text-sm text-slate-600">
                                                    <i data-lucide="map-pin" className="w-4 h-4 text-blue-400"></i>
                                                    <span className="font-medium">{mitra.City}, {mitra.Province}</span>
                                                </div>
                                                <div className="flex items-center gap-3 text-sm text-slate-600">
                                                    <i data-lucide="phone" className="w-4 h-4 text-blue-400"></i>
                                                    <span className="font-medium">{mitra.Phone}</span>
                                                </div>
                                            </div>

                                            <div className="space-y-4 pt-4 border-t border-slate-50">
                                                <div className="grid grid-cols-2 gap-3">
                                                    <div className="space-y-1">
                                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Join</label>
                                                        <input 
                                                            className="w-full px-3 py-2 bg-slate-50 border border-slate-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500/10"
                                                            value={mitra.Join || ""}
                                                            onChange={(e) => handleInputChange(mitra.rowIndex, 'Join', e.target.value)}
                                                        />
                                                    </div>
                                                    <div className="space-y-1">
                                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Verifikasi</label>
                                                        <input 
                                                            className="w-full px-3 py-2 bg-slate-50 border border-slate-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500/10"
                                                            value={mitra.Verif || ""}
                                                            onChange={(e) => handleInputChange(mitra.rowIndex, 'Verif', e.target.value)}
                                                        />
                                                    </div>
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Remark</label>
                                                    <textarea 
                                                        rows="2"
                                                        className="w-full px-3 py-2 bg-slate-50 border border-slate-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500/10 resize-none"
                                                        value={mitra.Remark || ""}
                                                        onChange={(e) => handleInputChange(mitra.rowIndex, 'Remark', e.target.value)}
                                                    />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="p-4 bg-slate-50 flex gap-2">
                                            <button 
                                                onClick={() => handleWhatsApp(mitra.Phone)}
                                                className="flex-1 bg-[#25D366] text-white py-3 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 hover:brightness-95 transition-all active:scale-95"
                                            >
                                                <i data-lucide="message-circle" className="w-4 h-4"></i> WA
                                            </button>
                                            <button 
                                                onClick={() => handleSave(mitra)}
                                                disabled={savingId === mitra.rowIndex}
                                                className="flex-1 bg-blue-600 text-white py-3 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 hover:bg-blue-700 disabled:opacity-50 transition-all active:scale-95 shadow-lg shadow-blue-600/20"
                                            >
                                                {savingId === mitra.rowIndex ? <div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <i data-lucide="save" className="w-4 h-4"></i>}
                                                Simpan
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Toast Notification */}
                    {notification && (
                        <div className={`fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 z-[100] animate-bounce ${notification.type === 'error' ? 'bg-red-600' : 'bg-slate-900'} text-white`}>
                            <i data-lucide={notification.type === 'error' ? 'alert-circle' : 'check-circle'} className="w-5 h-5"></i>
                            <span className="font-semibold text-sm">{notification.msg}</span>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize icons after render
        setTimeout(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>
